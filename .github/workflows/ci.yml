name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile all Python sources
        run: python -m compileall -q scripts hooks plugins tests
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Plugin package is in sync with canonical files
        run: |
          python scripts/sync_plugin.py
          git diff --exit-code
      - name: Validate Claude Code plugin packaging
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin validate --strict plugins/token-efficient-repo-work
          claude plugin validate --strict .
