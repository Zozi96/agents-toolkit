name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile all Python sources
        run: python -m compileall -q scripts hooks plugins tests
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: SessionStart hook runs via PowerShell wrapper
        shell: pwsh
        env:
          CLAUDE_PLUGIN_ROOT: ${{ github.workspace }}/plugins/token-efficient-repo-work
        run: |
          $out = '{}' | & ./plugins/token-efficient-repo-work/hooks/session-start.ps1
          if ($LASTEXITCODE -ne 0) { throw "hook exited $LASTEXITCODE" }
          $json = $out | ConvertFrom-Json
          if (-not $json.hookSpecificOutput.additionalContext) { throw "missing additionalContext" }
          if ($json.hookSpecificOutput.additionalContext -notmatch 'Repository Context') { throw "repository context was not generated" }

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile all Python sources
        run: python -m compileall -q scripts hooks plugins tests
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Plugin package is in sync with canonical files
        run: |
          python scripts/sync_plugin.py
          git diff --exit-code
      - name: Validate Claude Code plugin packaging
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin validate --strict plugins/token-efficient-repo-work
          claude plugin validate --strict .
