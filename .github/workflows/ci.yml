name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile all Python sources
        run: python -m compileall -q scripts hooks plugins tests
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Interpreter diagnostics
        shell: pwsh
        run: |
          foreach ($c in @(@("py", "-3"), @("python"), @("python3"))) {
            if (-not (Get-Command $c[0] -ErrorAction SilentlyContinue)) { Write-Host "$($c -join ' '): not found"; continue }
            $extra = if ($c.Count -gt 1) { $c[1..($c.Count - 1)] } else { @() }
            $v = & $c[0] @extra --version 2>&1 | Out-String
            Write-Host "$($c -join ' ') --version: exit=$LASTEXITCODE $($v.Trim())"
            $o = '{}' | & $c[0] @extra plugins/token-efficient-repo-work/hooks/session-start.py 2>&1 | Out-String
            Write-Host "$($c -join ' ') hook: exit=$LASTEXITCODE chars=$($o.Length)"
          }
      - name: SessionStart hook runs via PowerShell wrapper
        shell: pwsh
        env:
          CLAUDE_PLUGIN_ROOT: ${{ github.workspace }}/plugins/token-efficient-repo-work
        run: |
          # Diagnostics: python direct and in-process wrapper (non-blocking)
          $direct = '{}' | python plugins/token-efficient-repo-work/hooks/session-start.py | Out-String
          Write-Host "python-direct: exit=$LASTEXITCODE chars=$($direct.Length)"
          $inproc = '{}' | & ./plugins/token-efficient-repo-work/hooks/session-start.ps1 | Out-String
          Write-Host "wrapper-inprocess: exit=$LASTEXITCODE chars=$($inproc.Length)"
          # Real assertion: child pwsh with piped stdin, exactly how Claude Code invokes the hook
          $out = '{}' | pwsh -NoProfile -File plugins/token-efficient-repo-work/hooks/session-start.ps1 | Out-String
          Write-Host "wrapper-child: exit=$LASTEXITCODE chars=$($out.Length)"
          if ($LASTEXITCODE -ne 0) { throw "hook exited $LASTEXITCODE" }
          if (-not $out.Trim()) { throw "hook produced no output" }
          $json = $out | ConvertFrom-Json
          if (-not $json.hookSpecificOutput.additionalContext) { Write-Host "raw output: $out"; throw "missing additionalContext" }
          if ($json.hookSpecificOutput.additionalContext -notmatch 'Repository Context') { Write-Host "raw output: $out"; throw "repository context was not generated" }
      - name: PreToolUse hook runs via PowerShell wrapper
        shell: pwsh
        env:
          CLAUDE_PLUGIN_ROOT: ${{ github.workspace }}/plugins/token-efficient-repo-work
        run: |
          $deny = '{"tool_name":"Bash","tool_input":{"command":"pytest tests/"},"cwd":"."}' | pwsh -NoProfile -File plugins/token-efficient-repo-work/hooks/pre-tool-use.ps1 | Out-String
          Write-Host "deny probe: exit=$LASTEXITCODE chars=$($deny.Length)"
          if ($LASTEXITCODE -ne 0) { throw "hook exited $LASTEXITCODE" }
          if (($deny | ConvertFrom-Json).hookSpecificOutput.permissionDecision -ne 'deny') { throw "raw pytest was not denied" }
          $allow = '{"tool_name":"Bash","tool_input":{"command":"git status"},"cwd":"."}' | pwsh -NoProfile -File plugins/token-efficient-repo-work/hooks/pre-tool-use.ps1 | Out-String
          if ($LASTEXITCODE -ne 0) { throw "hook exited $LASTEXITCODE" }
          if ($allow.Trim()) { throw "git status was wrongly intercepted" }

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile all Python sources
        run: python -m compileall -q scripts hooks plugins tests
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Plugin package is in sync with canonical files
        run: |
          python scripts/sync_plugin.py
          git diff --exit-code
      - name: Validate Claude Code plugin packaging
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin validate --strict plugins/token-efficient-repo-work
          claude plugin validate --strict .
